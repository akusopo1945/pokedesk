<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#991B1B"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#FACC15" stroke-width="8"/>
  <!-- Pokeball band -->
  <rect x="16" y="240" width="480" height="32" fill="white"/>
  <!-- Pokeball center circle -->
  <circle cx="256" cy="256" r="48" fill="white" stroke="#1E293B" stroke-width="6"/>
  <circle cx="256" cy="256" r="28" fill="#1E293B"/>
  <!-- P letter -->
  <text x="256" y="180" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="white" opacity="0.9">P</text>
  <!-- D letter -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="white" opacity="0.9">D</text>
</svg>
